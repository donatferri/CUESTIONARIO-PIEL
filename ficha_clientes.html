<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fichas de clientes · RINGANA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:     #3a5a40;
      --verde-mid: #4e7a56;
      --verde-lg:  #e8f0e9;
      --arena:     #f7f4ef;
      --texto:     #1c1c1c;
      --gris:      #6b7280;
      --borde:     #d1cfc9;
      --sombra:    rgba(58, 90, 64, 0.08);

      /* tipos de piel */
      --seca-bg:  #edf2ff; --seca-dot:  #4c6ef5; --seca-txt:  #2b4acb;
      --norm-bg:  #e8f0e9; --norm-dot:  #3a5a40; --norm-txt:  #2d4a35;
      --mixt-bg:  #fff8db; --mixt-dot:  #f59f00; --mixt-txt:  #7a5000;
      --gras-bg:  #fff0f0; --gras-dot:  #e03131; --gras-txt:  #7a1e1e;
      --sens-bg:  #fff4e6; --sens-dot:  #e8721a; --sens-txt:  #7a3500;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--arena);
      color: var(--texto);
      min-height: 100vh;
      padding: 2rem 1.2rem 3rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: var(--verde);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    .logo-mark svg { width: 22px; height: 22px; fill: #fff; }
    .eyebrow {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--verde);
      margin-bottom: 0.3rem;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 500;
      line-height: 1.1;
    }
    header p {
      font-size: 0.8rem;
      color: var(--gris);
      margin-top: 0.4rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--gris);
      text-decoration: none;
      margin-top: 0.8rem;
      transition: color .15s;
    }
    .back-link:hover { color: var(--verde); }
    .back-link svg {
      width: 13px; height: 13px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      max-width: 860px;
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.55rem 1rem 0.55rem 2.2rem;
      border: 1px solid var(--borde);
      border-radius: 8px;
      background: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      color: var(--texto);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--verde-mid); }
    .search-icon {
      position: absolute; left: 0.7rem; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      fill: none; stroke: var(--borde);
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }

    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0.38rem 0.75rem;
      border: 1px solid var(--borde);
      border-radius: 20px;
      background: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--gris);
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--verde);
      color: var(--verde);
      background: var(--verde-lg);
    }
    .fdot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── STATS ── */
    .stats {
      max-width: 860px;
      margin: 0 auto 1.2rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.73rem;
      color: var(--gris);
    }
    .stats strong { color: var(--texto); font-weight: 600; }

    /* ── GRID ── */
    .grid {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 1.4rem 1.4rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--sombra);
      border-color: var(--verde-mid);
    }
    .card.open { border-color: var(--verde); }

    /* Avatar + nombre */
    .card-top { display: flex; align-items: flex-start; gap: 0.85rem; }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .card-name-block { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-email {
      font-size: 0.7rem;
      color: var(--gris);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 0.68rem;
      color: var(--borde);
      margin-top: 1px;
    }

    /* Badge tipo piel */
    .skin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .skin-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .skin-seca    { background: var(--seca-bg); color: var(--seca-txt); }
    .skin-seca    .dot { background: var(--seca-dot); }
    .skin-normal  { background: var(--norm-bg); color: var(--norm-txt); }
    .skin-normal  .dot { background: var(--norm-dot); }
    .skin-mixta   { background: var(--mixt-bg); color: var(--mixt-txt); }
    .skin-mixta   .dot { background: var(--mixt-dot); }
    .skin-grasa   { background: var(--gras-bg); color: var(--gras-txt); }
    .skin-grasa   .dot { background: var(--gras-dot); }
    .skin-sensible{ background: var(--sens-bg); color: var(--sens-txt); }
    .skin-sensible .dot { background: var(--sens-dot); }
    .skin-none    { background: #f3f3f3; color: #aaa; }
    .skin-none    .dot { background: #ccc; }

    /* Tags preocupaciones */
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: var(--arena);
      border: 1px solid var(--borde);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 0.65rem;
      color: var(--gris);
    }

    /* Divisor */
    .divider { height: 1px; background: var(--arena); margin: 0 -1.4rem; }

    /* Acciones rápidas */
    .card-actions {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .email-badge {
      font-size: 0.62rem; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
    }
    .email-sent    { background: var(--verde-lg); color: var(--verde); }
    .email-pending { background: #fff8db; color: #7a5000; }
    .spacer { flex: 1; }
    .btn-sm {
      padding: 5px 11px;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--borde);
      background: #fff;
      color: var(--gris);
      transition: all .15s;
    }
    .btn-sm:hover { border-color: var(--verde); color: var(--verde); }
    .btn-sm.primary {
      background: var(--verde); color: #fff; border-color: var(--verde);
    }
    .btn-sm.primary:hover { background: var(--verde-mid); }

    /* Expand arrow */
    .expand-arrow {
      position: absolute; bottom: 0.9rem; right: 1rem;
      width: 15px; height: 15px;
      fill: none; stroke: var(--borde);
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .15s, transform .2s;
    }
    .card:hover .expand-arrow { stroke: var(--verde-mid); }
    .card.open .expand-arrow  { stroke: var(--verde); transform: rotate(180deg); }

    /* ── DETALLE EXPANDIDO ── */
    .card-detail { display: none; flex-direction: column; gap: 0.6rem; }
    .card-detail.open { display: flex; }

    .detail-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--borde);
      margin-bottom: 0.4rem;
    }
    .answer-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--arena);
      font-size: 0.75rem;
    }
    .answer-row:last-child { border-bottom: none; }
    .answer-row span:first-child { color: var(--gris); }
    .answer-row span:last-child  { font-weight: 500; color: var(--texto); }
    .answer-row span.yes { color: var(--verde); }
    .answer-row span.no  { color: var(--borde); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .detail-item {
      background: var(--arena);
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
    }
    .detail-item label {
      font-size: 0.6rem;
      color: var(--gris);
      display: block;
      margin-bottom: 2px;
    }
    .detail-item span { font-size: 0.78rem; font-weight: 500; }

    /* ── ESTADOS ── */
    .state {
      max-width: 860px;
      margin: 4rem auto;
      text-align: center;
      color: var(--gris);
      font-size: 0.85rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--borde);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONFIG OVERLAY ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%; max-width: 400px;
    }
    .panel h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 500;
      margin-bottom: 0.3rem;
    }
    .panel p { font-size: 0.78rem; color: var(--gris); margin-bottom: 1.2rem; }
    .panel label { font-size: 0.75rem; font-weight: 500; display: block; margin-bottom: 4px; }
    .panel input {
      width: 100%; padding: 0.55rem 0.8rem;
      border: 1px solid var(--borde); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.8rem;
      outline: none; margin-bottom: 1rem;
    }
    .panel input:focus { border-color: var(--verde-mid); }
    .panel-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .btn-cancel {
      padding: 0.5rem 1rem; border-radius: 8px;
      background: var(--arena); border: 1px solid var(--borde);
      font-family: 'Inter', sans-serif; font-size: 0.78rem; cursor: pointer;
    }
    .btn-save {
      padding: 0.5rem 1.2rem; border-radius: 8px;
      background: var(--verde); color: #fff; border: none;
      font-family: 'Inter', sans-serif; font-size: 0.78rem;
      font-weight: 500; cursor: pointer;
    }
    .btn-save:hover { background: var(--verde-mid); }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.68rem;
      color: var(--borde);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 2C6 2 3 8 3 12c0 5 4 10 9 10s9-5 9-10c0-4-1-7-4-9-1 3-3 5-5 5 2-3 2-5 0-6z"/></svg>
  </div>
  <p class="eyebrow">RINGANA · Fichas de clientes</p>
  <h1>Tus clientas</h1>
  <p>Perfil de piel, preocupaciones y estado de recomendación</p>
  <a class="back-link" href="menu.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Volver al panel
  </a>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar por nombre o email…" oninput="applyFilters()">
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('seca',this)"><span class="fdot" style="background:var(--seca-dot)"></span>Seca</button>
    <button class="filter-btn" onclick="setFilter('normal',this)"><span class="fdot" style="background:var(--norm-dot)"></span>Normal</button>
    <button class="filter-btn" onclick="setFilter('mixta',this)"><span class="fdot" style="background:var(--mixt-dot)"></span>Mixta</button>
    <button class="filter-btn" onclick="setFilter('grasa',this)"><span class="fdot" style="background:var(--gras-dot)"></span>Grasa</button>
    <button class="filter-btn" onclick="setFilter('sensible',this)"><span class="fdot" style="background:var(--sens-dot)"></span>Sensible</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">⏳ Email pendiente</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid">
  <div class="state"><div class="spinner"></div><p>Cargando fichas…</p></div>
</div>

<!-- CONFIG -->
<div class="overlay" id="overlay" onclick="closeIfOut(event)">
  <div class="panel">
    <h2>Configuración</h2>
    <p>Pega la URL de tu deployment de Apps Script (la misma que usan tus formularios).</p>
    <label>URL del Apps Script (deployment)</label>
    <input type="text" id="cfgUrl" placeholder="https://script.google.com/macros/s/…/exec">
    <div class="panel-actions">
      <button class="btn-cancel" onclick="closeOverlay()">Cancelar</button>
      <button class="btn-save" onclick="saveConfig()">Guardar y cargar</button>
    </div>
  </div>
</div>

<footer>RINGANA · Panel privado</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const CFG_KEY = 'ringana_script_url';
let SCRIPT_URL = localStorage.getItem(CFG_KEY) || '';

function openOverlay()  { document.getElementById('cfgUrl').value = SCRIPT_URL; document.getElementById('overlay').classList.add('open'); }
function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }
function closeIfOut(e)  { if (e.target === document.getElementById('overlay')) closeOverlay(); }
function saveConfig()   {
  SCRIPT_URL = document.getElementById('cfgUrl').value.trim();
  localStorage.setItem(CFG_KEY, SCRIPT_URL);
  closeOverlay(); loadData();
}

// ─── FETCH ───────────────────────────────────────────────────────
async function fetchHoja(hoja) {
  const res  = await fetch(SCRIPT_URL + '?hoja=' + hoja);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.rows || [];
}

// ─── HELPERS ─────────────────────────────────────────────────────
const norm  = s => (s||'').toLowerCase().trim();
const initials = name => (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';

function skinClass(tipo) {
  const t = norm(tipo);
  if (t.includes('muy seca') || t.includes('seca'))   return 'seca';
  if (t.includes('normal') || t.includes('equilib'))  return 'normal';
  if (t.includes('mixta'))                             return 'mixta';
  if (t.includes('grasa') || t.includes('acne'))      return 'grasa';
  if (t.includes('sensible'))                         return 'sensible';
  return 'none';
}
const skinLabel = { seca:'Piel seca', normal:'Piel normal', mixta:'Piel mixta', grasa:'Piel grasa', sensible:'Piel sensible', none:'Sin datos' };
const avatarColor = { seca:'#4c6ef5', normal:'#3a5a40', mixta:'#f59f00', grasa:'#e03131', sensible:'#e8721a', none:'#bbb' };

function boolSpan(val) {
  const v = norm(String(val));
  if (!v || v==='no' || v==='false' || v==='') return '<span class="no">No</span>';
  return '<span class="yes">Sí</span>';
}
function tagsHtml(raw) {
  if (!raw) return '';
  return (raw+'').split(/[,;\/]/).map(s=>s.trim()).filter(Boolean)
    .map(s=>`<span class="tag">${s}</span>`).join('');
}

// ─── ESTADO GLOBAL ───────────────────────────────────────────────
let allClients = [];
let activeFilter = 'all';

// ─── LOAD ────────────────────────────────────────────────────────
async function loadData() {
  if (!SCRIPT_URL) { showConfigPrompt(); return; }
  showLoading();
  try {
    const [clientes, piel, reco] = await Promise.all([
      fetchHoja('clientes'),
      fetchHoja('tipopiel'),
      fetchHoja('recomendaciones').catch(()=>[])
    ]);

    const pielMap = {};
    piel.forEach(r => { if(r.Email) pielMap[norm(r.Email)] = r; });

    const recoSet = new Set();
    reco.forEach(r => { if(r.Email) recoSet.add(norm(r.Email)); });

    allClients = clientes.map(c => {
      const email = norm(c.Email);
      const p = pielMap[email] || {};
      const cls = skinClass(p['Tipo de piel'] || '');
      // edad desde cuestionario o fecha nac
      let edadStr = (p.Edad||'').toString();
      if (!edadStr && c['Fecha nacimiento']) {
        const diff = new Date() - new Date(c['Fecha nacimiento']);
        const yrs  = Math.floor(diff/3.156e10);
        if (yrs > 0 && yrs < 120) edadStr = yrs + ' años';
      }
      return {
        nombre: (c.Nombre||c['Nombre ']||'').trim(),
        genero: c['Género']||'',
        email:  c.Email||'',
        tel:    c['Teléfono']||'',
        ciudad: c.Ciudad||'',
        fecha:  c.Fecha||c.Timestamp||'',
        tipoPiel:   p['Tipo de piel']||'',
        sensible:   p.Sensible||'',
        deshidrat:  p.Deshidratada||'',
        preocup:    p.Preocupaciones||'',
        manana:     p['Mañana']||'',
        brillo:     p.Brillo||'',
        tirantez:   p.Tirantez||'',
        reaccion:   p['Reacción']||p['Reaccion']||'',
        poros:      p.Poros||'',
        granitos:   p.Granitos||'',
        finalDia:   p['Final del día']||p['Final día']||'',
        hidratante: p.Hidratante||'',
        edad:       edadStr,
        skinCls:    cls,
        hasPiel:    !!p['Tipo de piel'],
        emailSent:  recoSet.has(email)
      };
    });
    applyFilters();
  } catch(err) {
    showError(err.message);
  }
}

function showLoading() {
  document.getElementById('grid').innerHTML = '<div class="state"><div class="spinner"></div><p>Cargando fichas…</p></div>';
  document.getElementById('stats').innerHTML = '';
}
function showError(msg) {
  document.getElementById('grid').innerHTML = `
    <div class="state">
      <p>⚠️ No se pudieron cargar los datos.</p>
      <p style="font-size:.72rem;color:#bbb">${msg||''}</p>
      <button class="btn-sm" onclick="openOverlay()" style="margin-top:.5rem">Configurar URL del script</button>
    </div>`;
}
function showConfigPrompt() {
  document.getElementById('grid').innerHTML = `
    <div class="state">
      <p>Para cargar los datos necesitas configurar la URL de tu Apps Script.</p>
      <button class="btn-sm primary" onclick="openOverlay()" style="margin-top:.5rem">Configurar ahora</button>
    </div>`;
}

// ─── FILTROS ─────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function applyFilters() {
  const q = norm(document.getElementById('searchInput').value);
  let list = allClients;
  if (activeFilter === 'pending') {
    list = list.filter(c => !c.emailSent);
  } else if (activeFilter !== 'all') {
    list = list.filter(c => c.skinCls === activeFilter);
  }
  if (q) list = list.filter(c => norm(c.nombre).includes(q) || norm(c.email).includes(q) || norm(c.ciudad).includes(q));
  renderGrid(list);
}

// ─── RENDER ──────────────────────────────────────────────────────
function renderGrid(list) {
  const total   = allClients.length;
  const pending = allClients.filter(c=>!c.emailSent).length;
  const sent    = total - pending;
  document.getElementById('stats').innerHTML =
    `<span>Total: <strong>${total}</strong></span>` +
    `<span>Email pendiente: <strong>${pending}</strong></span>` +
    `<span>Email enviado: <strong>${sent}</strong></span>`;

  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="state"><p>No hay clientas que coincidan.</p></div>';
    return;
  }
  document.getElementById('grid').innerHTML = list.map((c,i) => cardHtml(c,i)).join('');
}

function cardHtml(c, i) {
  const cls   = c.skinCls;
  const color = avatarColor[cls] || '#bbb';
  const tags  = tagsHtml(c.preocup);

  const metaParts = [c.ciudad, c.edad, c.genero].filter(Boolean);

  return `
<div class="card" id="card-${i}" onclick="toggle(${i})">
  <div class="card-top">
    <div class="avatar" style="background:${color}">${initials(c.nombre)}</div>
    <div class="card-name-block">
      <div class="card-name">${c.nombre||'(sin nombre)'}</div>
      <div class="card-email">${c.email}</div>
      ${metaParts.length ? `<div class="card-sub">${metaParts.join(' · ')}</div>` : ''}
    </div>
  </div>

  <span class="skin-badge skin-${cls}">
    <span class="dot"></span>${skinLabel[cls]||cls}
  </span>

  ${tags ? `<div class="tags">${tags}</div>` : ''}

  <div class="divider"></div>

  <div class="card-actions">
    <span class="email-badge ${c.emailSent?'email-sent':'email-pending'}">
      ${c.emailSent ? '✓ Email enviado' : '⏳ Pendiente'}
    </span>
    <span class="spacer"></span>
    <button class="btn-sm" onclick="copyEmail(event,'${c.email}')">Copiar email</button>
  </div>

  <!-- DETALLE -->
  <div class="card-detail" id="detail-${i}">
    <div class="divider" style="margin:0"></div>
    ${c.hasPiel ? `
    <div>
      <p class="detail-label">Perfil de piel</p>
      <div class="answer-row"><span>Tipo</span><span>${c.tipoPiel}</span></div>
      <div class="answer-row"><span>Sensible</span>${boolSpan(c.sensible)}</div>
      <div class="answer-row"><span>Deshidratada</span>${boolSpan(c.deshidrat)}</div>
      <div class="answer-row"><span>Brillo a mediodía</span>${boolSpan(c.brillo)}</div>
      <div class="answer-row"><span>Tirantez</span>${boolSpan(c.tirantez)}</div>
      <div class="answer-row"><span>Reacción a cosméticos</span>${boolSpan(c.reaccion)}</div>
      <div class="answer-row"><span>Poros visibles</span>${boolSpan(c.poros)}</div>
      <div class="answer-row"><span>Granitos</span>${boolSpan(c.granitos)}</div>
      ${c.manana   ? `<div class="answer-row"><span>Por la mañana</span><span>${c.manana}</span></div>`  : ''}
      ${c.finalDia ? `<div class="answer-row"><span>Al final del día</span><span>${c.finalDia}</span></div>` : ''}
      ${c.hidratante ? `<div class="answer-row"><span>Usa hidratante</span><span>${c.hidratante}</span></div>` : ''}
    </div>` : '<p style="font-size:.75rem;color:var(--gris)">No ha completado el cuestionario de piel.</p>'}
    ${(c.tel||c.ciudad) ? `
    <div>
      <p class="detail-label">Contacto</p>
      <div class="detail-grid">
        ${c.tel    ? `<div class="detail-item"><label>Teléfono</label><span>${c.tel}</span></div>`    : ''}
        ${c.ciudad ? `<div class="detail-item"><label>Ciudad</label><span>${c.ciudad}</span></div>` : ''}
      </div>
    </div>` : ''}
  </div>

  <svg class="expand-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</div>`;
}

// ─── ACCIONES ────────────────────────────────────────────────────
function toggle(i) {
  const detail = document.getElementById(`detail-${i}`);
  const card   = document.getElementById(`card-${i}`);
  const open   = detail.classList.toggle('open');
  card.classList.toggle('open', open);
}
function copyEmail(e, email) {
  e.stopPropagation();
  navigator.clipboard.writeText(email).then(() => {
    const b = e.target; const orig = b.textContent;
    b.textContent = '✓ Copiado';
    setTimeout(()=> b.textContent = orig, 1500);
  });
}

// ─── INIT ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
